# Production profile
spring.datasource.url=${PROD_DB_URL}
spring.datasource.driver-class-name=${PROD_DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${PROD_DB_USERNAME}
spring.datasource.password=${PROD_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${PROD_JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${PROD_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${PROD_JPA_FORMAT_SQL:false}
spring.jpa.database-platform=${PROD_JPA_PLATFORM:org.hibernate.dialect.MySQLDialect}

# Optional tuning
spring.datasource.hikari.maximum-pool-size=${PROD_DB_MAX_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${PROD_DB_MIN_IDLE:5}

# Runtime
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=native

# Production CORS / OAuth frontend redirect
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://booktine.cloud}
app.oauth2.redirect-url=${OAUTH2_REDIRECT_URL:https://booktine.cloud/oauth2/callback}

# External APIs
aladin.api.ttb-key=${ALADIN_TTB_KEY:}

# JWT (must be overridden in production)
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}

# OAuth2 Client
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# AWS S3
spring.cloud.aws.region.static=${AWS_REGION:ap-northeast-2}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
spring.cloud.aws.s3.bucket=${AWS_S3_BUCKET}
spring.cloud.aws.stack.auto-detection.enabled=false

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=true

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Production logging
logging.level.org.hibernate.SQL=${PROD_HIBERNATE_SQL_LOG_LEVEL:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${PROD_HIBERNATE_BIND_LOG_LEVEL:INFO}

# Swagger (disabled in production)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false