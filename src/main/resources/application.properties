spring.application.name=booktine
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:booktine-local-secret-key-for-jwt-signing}
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# AWS S3
spring.cloud.aws.region.static=${AWS_REGION:ap-northeast-2}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:dummy}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:dummy}
spring.cloud.aws.s3.bucket=${AWS_S3_BUCKET:booktine-local}
spring.cloud.aws.stack.auto-detection.enabled=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Aladin API
aladin.api.ttb-key=${ALADIN_TTB_KEY:dummy}

