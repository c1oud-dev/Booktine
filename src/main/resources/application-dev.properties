# Local development profile
spring.datasource.url=${DEV_DB_URL:jdbc:h2:mem:booktine;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DEV_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DEV_DB_USERNAME:sa}
spring.datasource.password=${DEV_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DEV_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${DEV_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${DEV_JPA_FORMAT_SQL:true}
spring.jpa.database-platform=${DEV_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=${DEV_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${DEV_H2_CONSOLE_PATH:/h2-console}

# S3 ???? (??)
spring.cloud.aws.s3.enabled=false
spring.cloud.aws.region.instance-profile=false